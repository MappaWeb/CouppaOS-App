name: glass_bottom_navigation
description: A customizable Liquid Glass bottom navigation bar with native iOS 26 support and Flutter fallback glass effects.
version: 0.2.0
homepage: https://github.com/hame-dev/glass_bottom_navigation.git 

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: GlassBottomNavigationPlugin
