name: couppa_mini
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  core:
    git:
      url: https://github.com/MappaWeb/AppCore.git
      path: packages/shared_core
      ref: 97c321add80d4de26b092a64406ef50d59b7294d
  core_monitoring:
    git:
      url: https://github.com/MappaWeb/AppCore.git
      path: packages/shared_monitoring
      ref: 97c321add80d4de26b092a64406ef50d59b7294d
  core_data:
    git:
      url: https://github.com/MappaWeb/AppCore.git
      path: packages/core_data
      ref: 97c321add80d4de26b092a64406ef50d59b7294d
  core_rest:
    git:
      url: https://github.com/MappaWeb/AppCore.git
      path: packages/core_rest
      ref: 97c321add80d4de26b092a64406ef50d59b7294d
  core_auth:
    git:
      url: https://github.com/MappaWeb/AppCore.git
      path: packages/shared_auth
      ref: 97c321add80d4de26b092a64406ef50d59b7294d

  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0

  glass_bottom_navigation: ^0.2.0
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2


dependency_overrides:
  flutter_lints: ^6.0.0
  firebase_core: ^4.0.0
  firebase_analytics: ^12.0.0
  firebase_crashlytics: ^5.0.0
  firebase_messaging: ^16.0.0
  # AGP 9 fix: 1.1.3 calls getDefaultProguardFile('proguard-android.txt')
  # which AGP 9 dropped. Upstream fixed it in 1.2.0-beta.3 (PR #2765).
  # Bumping the whole family because the beta requires platform_interface ^1.4.0-beta.3.
  flutter_inappwebview: ^6.2.0-beta.3
  flutter_inappwebview_android: ^1.2.0-beta.3
  flutter_inappwebview_ios: ^1.2.0-beta.3
  flutter_inappwebview_macos: ^1.2.0-beta.3
  flutter_inappwebview_web: ^1.2.0-beta.3
  flutter_inappwebview_windows: ^0.7.0-beta.3
  flutter_inappwebview_platform_interface: ^1.4.0-beta.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.12.0
  build_runner: ^2.10.4
flutter:
  uses-material-design: true

  generate: true
  assets:
    - assets/
    - assets/icons/
    - assets/images/
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
